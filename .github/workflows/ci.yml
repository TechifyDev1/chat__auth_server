name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check Formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run Clippy
        run: cargo clippy -- -D warnings

  test:
    name: TestSuite
    runs-on: ubuntu-latest

    env:
      APP__ENV: development
      APP__SERVER__HOST: 127.0.0.1
      APP__SERVER__PORT: 8000
      APP__DATABASE__ENGINE: postgres
      APP__DATABASE__HOST: localhost
      APP__DATABASE__NAME: ${{ secrets.CI_DB_NAME }}
      APP__DATABASE__PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      APP__DATABASE__PORT: 5433
      APP__DATABASE__USER: ${{ secrets.CI_DB_USER }}

      APP__AUTH__JWT_ACCESS_EXPIRATION_TIME_IN_HOURS: 1
      APP__AUTH__JWT_ONE_TIME_PASSWORD_LIFETIME_IN_MINUTES: 5
      APP__AUTH__JWT_REFRESH_EXPIRATION_TIME_IN_HOURS: 24
      APP__AUTH__JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}

      DATABASE_URL: postgres://${{ secrets.CI_DB_USER }}:${{ secrets.CI_DB_PASSWORD }}@localhost:5433/${{ secrets.CI_DB_NAME }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.CI_DB_NAME }}
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run Migrations
        run: sqlx migrate run

      - name: Run All Tests
        run: cargo test